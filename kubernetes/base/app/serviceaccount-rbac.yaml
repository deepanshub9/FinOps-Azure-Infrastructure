apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloud-cost-advisor-sa
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloud-cost-advisor-read-config
  namespace: dev
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloud-cost-advisor-read-config-binding
  namespace: dev
subjects:
  - kind: ServiceAccount
    name: cloud-cost-advisor-sa
    namespace: dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloud-cost-advisor-read-config
