apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-cost-advisor
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-cost-advisor
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: cloud-cost-advisor
    spec:
      serviceAccountName: cloud-cost-advisor-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: cloud-cost-advisor:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DEMO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cloud-cost-advisor-akv
                  key: demo-api-key
                  optional: true
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: cloud-cost-advisor-config
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 400m
              memory: 384Mi
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            failureThreshold: 12
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: tmp
              mountPath: /tmp
            - name: akv-secrets
              mountPath: /mnt/secrets-store
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: cloud-cost-advisor-data
        - name: tmp
          emptyDir: {}
        - name: akv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: cloud-cost-advisor-akv
