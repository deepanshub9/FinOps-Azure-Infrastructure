# IMPORTANT: This policy depends on AKS network policy enforcement.
# This project enables it in Terraform via:
# terraform/modules/aks/main.tf -> network_profile.network_policy = "azure".
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: dev
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
