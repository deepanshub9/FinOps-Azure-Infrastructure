apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
# Use this issuer for testing cert-manager config (no rate limits).
# Switch to letsencrypt-prod for real HTTPS.
spec:
  acme:
    email: 20109458@mail.wit.ie
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: nginx
